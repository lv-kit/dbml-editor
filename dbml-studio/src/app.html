<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DBML Studio</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem('themePreference');
        const legacyTheme = localStorage.getItem('darkMode');
        const theme = ['light', 'dark', 'system'].includes(storedTheme)
          ? storedTheme
          : legacyTheme === 'true'
            ? 'dark'
            : legacyTheme === 'false'
              ? 'light'
              : 'system';
        const isDark = theme === 'system'
          ? window.matchMedia('(prefers-color-scheme: dark)').matches
          : theme === 'dark';
        document.documentElement.classList.toggle('dark', isDark);

        const storedLocale = localStorage.getItem('locale');
        const browserLocale = navigator.language.toLowerCase().split('-')[0];
        const locale = ['ja', 'en', 'es'].includes(storedLocale)
          ? storedLocale
          : ['ja', 'en', 'es'].includes(browserLocale)
            ? browserLocale
            : 'ja';
        document.documentElement.lang = locale;
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
